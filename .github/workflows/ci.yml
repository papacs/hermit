name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .[dev]

      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run PowerShell asset tests
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File tests\verify-assets-tests.ps1

      - name: Run PowerShell install bootstrap tests
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File tests\install-bootstrap-tests.ps1

